<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Lithe visual forms</title><link rel="stylesheet" href="../dist/lithe.css"><script src="../dist/lithe.js" defer></script><style>body{padding:2rem}.matrix{display:grid;gap:1rem;grid-template-columns:repeat(auto-fit,minmax(14rem,1fr))}</style></head><body><main class="container stack"><h1>Visual forms</h1><div class="matrix"><input class="input sm" placeholder="Small"><input class="input md" placeholder="Medium"><input class="input xl" placeholder="Extra large"><select class="select md"><option>Select</option></select><input class="file-input md" type="file"><input class="range" type="range" value="40"></div><div class="cluster"><label class="check"><input class="check-input" type="checkbox" checked> Checkbox</label><label class="radio"><input class="radio-input" type="radio" checked> Radio</label><label class="switch"><input class="switch-input" type="checkbox" checked><span class="switch-control" aria-hidden="true"></span><span class="switch-label">Switch</span></label></div></main></body></html>
