name: Create GitHub release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run release:check

      - name: Create distributable archives
        run: |
          npm pack
          zip -r "lithe-css-${GITHUB_REF_NAME}.zip" dist src docs demo assets README.md CHANGELOG.md LICENSE package.json
          sha256sum lithe-css-*.tgz lithe-css-*.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lithe-css-*.tgz
            lithe-css-*.zip
            SHA256SUMS.txt
